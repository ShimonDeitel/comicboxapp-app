name: Comicbox
options:
  bundleIdPrefix: com.shimondeitel.comicboxapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Comicbox:
    type: application
    platform: iOS
    sources:
      - path: Comicbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.comicboxapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Comicbox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ComicboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ComicboxTests
      - path: Comicbox.storekit
    dependencies:
      - target: Comicbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.comicboxapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ComicboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ComicboxUITests
    dependencies:
      - target: Comicbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.comicboxapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Comicbox:
    build:
      targets:
        Comicbox: all
        ComicboxTests: [test]
        ComicboxUITests: [test]
    test:
      targets:
        - ComicboxTests
        - ComicboxUITests
